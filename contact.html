<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 福岡ゴルフ場ガイド</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:#1a5c38; --green-mid:#2e8b57; --green-light:#e8f5ee;
      --bg:#f2f5f0; --text:#1e1e2e; --muted:#6b7280; --radius:14px;
    }
    body { font-family:'Hiragino Sans','Noto Sans KR','Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
    .page-header { background:linear-gradient(160deg,var(--green-dark) 0%,#267347 60%,#3aaa6e 100%); color:#fff; padding:22px 20px 18px; text-align:center; }
    .page-header h1 { font-size:1.2rem; font-weight:800; }
    .page-header p { font-size:0.78rem; opacity:0.85; margin-top:5px; line-height:1.5; }
    .back-bar { background:#fff; padding:10px 16px; border-bottom:1px solid #e0e8e0; font-size:0.8rem; }
    .back-bar a { color:var(--green-dark); text-decoration:none; font-weight:700; }
    .content { padding:16px; max-width:680px; margin:0 auto 48px; }
    .desc { background:#fff; border-radius:var(--radius); padding:16px; font-size:0.84rem; line-height:1.7; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,.07); }
    .form-wrap { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,.08); }
    .form-wrap iframe { display:block; width:100%; height:700px; border:0; }
    footer { text-align:center; font-size:0.72rem; color:var(--muted); padding:16px; border-top:1px solid #dde8dd; }
    footer a { color:var(--green-dark); text-decoration:none; }
  </style>
</head>
<body>
<header class="page-header">
  <h1>✉️ お問い合わせ</h1>
  <p>Contact / 문의하기</p>
</header>
<div class="back-bar">← <a href="index.html">トップに戻る / Back to Top / 목록으로</a></div>

<div class="content">
  <div class="desc">
    掲載してほしいゴルフ場のリクエスト、情報の修正・追加、その他ご意見・ご感想などお気軽にどうぞ。<br>
    <span style="color:#6b7280;">Feel free to send course requests, corrections, or any feedback. / 골프장 등록 요청, 정보 수정, 기타 문의를 보내주세요.</span>
  </div>
  <div class="form-wrap">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeMEzsok3xdjDsf50Li_tPjQtN8eWJhokKO6TfjlIqwRetosg/viewform?embedded=true" height="700" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
  </div>
</div>

<footer>← <a href="index.html">トップに戻る / Back to Top / 목록으로</a>　|　このサイトはゴルフ好きが作った情報ガイドです。</footer>
</body>
</html>
